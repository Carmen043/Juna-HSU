<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>HSU Karteikarten</title>
<style>
  :root{
    --tief: #16324F;
    --alpin: #3E6D9C;
    --himmel: #A7C7E7;
    --creme: #F7F2E7;
    --gold: #D9A441;
    --terra: #C1533B;
    --tanne: #4C7A50;
    --karte-bg: #FFFFFF;
    --text: #1E2A33;
    --muted: #6B7A85;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0;
    font-family: 'Nunito', -apple-system, sans-serif;
    background: var(--creme);
    color: var(--text);
    min-height:100vh;
    padding-bottom: 2rem;
  }
  .raute-band{
    height:14px;
    background:
      linear-gradient(45deg, var(--himmel) 25%, transparent 25%, transparent 75%, var(--himmel) 75%) 0 0/28px 28px,
      linear-gradient(45deg, var(--himmel) 25%, var(--creme) 25%, var(--creme) 75%, var(--himmel) 75%) 14px 14px/28px 28px;
  }
  header{
    padding: 1.1rem 1.2rem 0.6rem;
    text-align:center;
  }
  h1{
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    color: var(--tief);
    margin: 0.2rem 0 0.1rem;
    letter-spacing: 0.2px;
  }
  .sub{
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0;
  }
  .mountain-wrap{
    position:relative;
    margin: 0.8rem auto 0.4rem;
    max-width: 420px;
    padding: 0 1rem;
  }
  .mountain-label{
    position:absolute;
    top: 4px;
    right: 14px;
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
  }
  .screen{
    max-width: 460px;
    margin: 0 auto;
    padding: 0 1rem;
  }
  .setup-card, .card-shell{
    background: var(--karte-bg);
    border-radius: 18px;
    padding: 1.1rem 1.1rem 1.3rem;
    box-shadow: 0 2px 10px rgba(22,50,79,0.08);
    margin-bottom: 1rem;
  }
  .cat-list{
    display:flex; flex-direction:column; gap:8px;
    margin: 0.6rem 0 1rem;
  }
  .cat-item{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 12px;
    border: 1.5px solid #E4DCC8;
    border-radius: 12px;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--tief);
  }
  .cat-item .count{
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--creme);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .cat-item.weak .count{ color: var(--terra); background:#FBE7E2; }
  .toggle{
    width: 42px; height: 24px; border-radius: 20px;
    background: #DCD4BF; position:relative; flex-shrink:0; border:none; cursor:pointer;
    margin-left: 10px;
  }
  .toggle.on{ background: var(--tanne); }
  .toggle::after{
    content:''; position:absolute; top:2px; left:2px;
    width:20px; height:20px; border-radius:50%; background:white;
    transition: transform 0.15s ease;
  }
  .toggle.on::after{ transform: translateX(18px); }
  button.primary{
    width:100%;
    background: var(--tief);
    color: white;
    border:none;
    padding: 14px;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Fredoka', sans-serif;
    cursor:pointer;
  }
  button.primary:active{ transform: scale(0.98); }
  button.ghost{
    width:100%;
    background: transparent;
    color: var(--tief);
    border: 1.5px solid var(--tief);
    padding: 11px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Fredoka', sans-serif;
    cursor:pointer;
    margin-top: 0.6rem;
  }
  .stat-row{
    display:flex; justify-content:space-between;
    font-size: 0.8rem; color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .progressbar{
    height:8px; background:#EEE6D3; border-radius:6px; overflow:hidden; margin-bottom: 1rem;
  }
  .progressbar > div{
    height:100%; background: var(--tanne); border-radius:6px;
    transition: width 0.3s ease;
  }
  .flashcard{
    min-height: 190px;
    border-radius: 16px;
    border: 2px solid var(--himmel);
    background: var(--creme);
    display:flex; flex-direction: column; align-items:center; justify-content:center;
    text-align:center;
    padding: 1.4rem 1.2rem;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--tief);
    cursor:pointer;
    position:relative;
  }
  .flashcard .tag{
    position:absolute; top:10px; left:12px;
    font-size:0.68rem; font-weight:700; color: var(--alpin);
    text-transform:uppercase; letter-spacing:0.4px;
  }
  .flashcard .hint{
    position:absolute; bottom:10px; font-size: 0.72rem; color: var(--muted); font-weight:600;
  }
  .flashcard.flipped{
    background: #FFF; border-color: var(--gold);
    color: var(--terra);
  }
  .answer-buttons{
    display:flex; gap:10px; margin-top: 1rem;
  }
  .answer-buttons button{
    flex:1; border:none; padding:14px 8px; border-radius:14px;
    font-weight: 700; font-family:'Fredoka', sans-serif; font-size: 0.95rem; cursor:pointer;
  }
  .btn-again{ background:#FBE7E2; color: var(--terra); }
  .btn-know{ background:#E3EFDF; color: var(--tanne); }
  .btn-again:active, .btn-know:active{ transform: scale(0.97); }
  .top-bar{
    display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.7rem;
  }
  .back-link{
    font-size: 0.85rem; color: var(--alpin); font-weight:700; cursor:pointer; background:none; border:none; padding:4px;
  }
  .cat-name{
    font-size: 0.85rem; font-weight:700; color: var(--tief);
  }
  footer{
    text-align:center; font-size: 0.72rem; color: var(--muted); margin-top: 1.2rem; padding: 0 2rem;
  }
  .empty{
    text-align:center; padding: 2rem 1rem; color: var(--muted); font-size: 0.9rem;
  }
  .geo-map{
    width: 100%;
    max-height: 150px;
    margin-bottom: 0.6rem;
  }
  .icon-map{
    max-height: 70px;
    width: 70px;
    margin: 0 auto 0.6rem;
    display:block;
  }
  .answer-input{
    width:100%;
    padding: 13px 14px;
    border: 2px solid #E4DCC8;
    border-radius: 12px;
    font-size: 1.05rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--tief);
    margin-top: 0.9rem;
  }
  .answer-input:focus{
    outline:none; border-color: var(--alpin);
  }
  .feedback-box{
    margin-top: 0.9rem;
    padding: 12px 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .feedback-ok{ background:#E3EFDF; color: var(--tanne); }
  .feedback-bad{ background:#FBE7E2; color: var(--terra); }
  .typed-echo{
    font-weight: 400; font-size: 0.85rem; opacity: 0.8;
  }
  .geo-region{ fill: #E4DCC8; stroke: #FFFFFF; stroke-width: 2; }
  .geo-region-active{ fill: var(--terra); stroke: var(--tief); stroke-width: 2.5; }
  .geo-dot{ fill: #C9BFA0; }
  .geo-active{ fill: var(--terra); stroke: var(--tief); stroke-width: 2; }
  .geo-pin{ fill: var(--gold); stroke: var(--tief); stroke-width: 1.5; }
  .geo-pin-label{ font-size: 11px; font-weight: 700; fill: var(--tief); }
</style>
</head>

let ALL_CARDS = [];
Object.entries(DECKS).forEach(([deckId, deck]) => {
  deck.cards.forEach((c, i) => {
    const isArr = Array.isArray(c);
    const front = isArr ? c[0] : c.front;
    const back = isArr ? c[1] : c.back;
    const icon = isArr ? null : c.icon;
    const input = isArr ? false : !!c.input;
    const map = isArr ? null : c.map;
    ALL_CARDS.push({ id: deckId + "_" + i, deck: deckId, front, back, icon, input, map });
  });

function normalizeAnswer(str){
  return String(str || "").trim().toLowerCase().replace(/\s+/g, " ");
}

const NEIGHBOR_LAYOUT = [
  { name:"Dänemark", angle:0 },
  { name:"Polen", angle:42 },
  { name:"Tschechien", angle:85 },
  { name:"Österreich", angle:120 },
  { name:"Schweiz", angle:155 },

];

function drawNeighborMap(target){
  if(!target) return "";
  const cx = 150, cy = 150, r = 100;
  let shapes = `<ellipse cx="${cx}" cy="${cy}" rx="42" ry="34" fill="#AFC2CE" stroke="#16324F" stroke-width="2"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="700" fill="#16324F">Deutschland</text>`;
  NEIGHBOR_LAYOUT.forEach(n => {
    const rad = n.angle * Math.PI / 180;
    const x = cx + r * Math.sin(rad);
    const y = cy - r * Math.cos(rad);
    const active = n.name === target;
    const fill = active ? "#C1533B" : "#E4DCC8";
    shapes += `<ellipse cx="${x}" cy="${y}" rx="34" ry="24" fill="${fill}" stroke="#16324F" stroke-width="2"/>`;
    if(!active){
      shapes += `<text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" font-weight="700" fill="#16324F">${n.name}</text>`;
    }
  });
  return `<svg class="geo-map" viewBox="0 0 300 300">${shapes}</svg>`;
}

};

function drawIconSVG(key){
  if(!key || !ICONS[key]) return "";
  return `<svg class="geo-map icon-map" viewBox="0 0 60 60">${ICONS[key]}</svg>`;
}

let state = {};
let selectedDecks = new Set(Object.keys(DECKS));
let onlyWeak = false;
let session = null;

const SUPABASE_URL = "DEINE_SUPABASE_PROJECT_URL";
const SUPABASE_ANON_KEY = "DEIN_SUPABASE_ANON_KEY";
const SUPABASE_CONFIGURED = !SUPABASE_URL.startsWith("DEINE_") && !SUPABASE_ANON_KEY.startsWith("DEIN_");
let sb = null;
if(SUPABASE_CONFIGURED && window.supabase){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

const STORAGE_KEY = "hsu-flashcards-state-v1";

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) state = JSON.parse(raw);
  }catch(e){ state = {}; }
  ALL_CARDS.forEach(c => { if(!state[c.id]) state[c.id] = { box: 0 }; });

  if(sb){
    try{
      const { data, error } = await sb.from('flashcard_state').select('card_id, box');
      if(data){
        data.forEach(row => {
          if(state[row.card_id]) state[row.card_id].box = row.box;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
    }catch(e){}
  }
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

async function syncCard(cardId, box){
  if(!sb) return;
  try{
    await sb.from('flashcard_state').upsert({ card_id: cardId, box: box, updated_at: new Date().toISOString() });
  }catch(e){}
}

function boxOf(id){ return state[id] ? state[id].box : 0; }

function pickCard(pool){
  if(pool.length === 0) return null;
  const weights = pool.map(c => Math.max(1, 5 - boxOf(c.id)));
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for(let i=0;i<pool.length;i++){
    r -= weights[i];
    if(r <= 0) return pool[i];
  }
  return pool[pool.length-1];
}

function currentPool(){
  let pool = ALL_CARDS.filter(c => selectedDecks.has(c.deck));
  if(onlyWeak) pool = pool.filter(c => boxOf(c.id) <= 1);
  return pool;
}

function overallProgress(){
  const total = ALL_CARDS.length;
  const mastered = ALL_CARDS.filter(c => boxOf(c.id) >= 4).length;
  return { total, mastered, pct: total ? Math.round(mastered/total*100) : 0 };
}

function drawMountain(pct){
  const svg = document.getElementById("mountain-svg");
  const px = 40 + (400-80) * (pct/100);
  const py = 95 - 70 * (pct/100);
  svg.innerHTML = `
    <polygon points="10,100 130,25 175,55 260,10 390,100" fill="none" stroke="#3E6D9C" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="10,100 130,25 175,55 260,10 390,100" fill="#A7C7E7" opacity="0.35"/>
    <circle cx="${px}" cy="${py}" r="7" fill="#D9A441" stroke="#16324F" stroke-width="2"/>
  `;
  document.getElementById("mountain-pct").textContent = pct + "% geschafft";
}

function render(){
  const app = document.getElementById("app");
  const prog = overallProgress();
  drawMountain(prog.pct);

  if(!session){
    let html = `<div class="setup-card">
      <div class="stat-row"><span>Insgesamt gemeistert</span><span>${prog.mastered} / ${prog.total}</span></div>
      <div class="progressbar"><div style="width:${prog.pct}%"></div></div>
      <div class="cat-list">`;

    Object.entries(DECKS).forEach(([id, deck]) => {
      const cards = ALL_CARDS.filter(c => c.deck === id);
      const weakCount = cards.filter(c => boxOf(c.id) <= 1).length;
      const checked = selectedDecks.has(id) ? "checked" : "";
      html += `<label class="cat-item ${weakCount > cards.length/2 ? 'weak' : ''}">
        <span style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" data-deck="${id}" ${checked} style="width:18px;height:18px;">
          ${deck.name}
        </span>
        <span class="count">${weakCount} zu üben</span>
      </label>`;
    });

    html += `</div>
      <label style="display:flex;align-items:center;justify-content:space-between;font-size:0.9rem;font-weight:700;color:var(--tief);margin-bottom:0.8rem;">
        Nur schwache Karten üben
        <button class="toggle ${onlyWeak ? 'on' : ''}" id="weak-toggle"></button>
      </label>
      <button class="primary" id="start-btn">Üben starten</button>
    </div>`;

    app.innerHTML = html;

    app.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', e => {
        const d = e.target.getAttribute('data-deck');
        if(e.target.checked) selectedDecks.add(d); else selectedDecks.delete(d);
        render();
      });
    });
    document.getElementById('weak-toggle').addEventListener('click', () => {
      onlyWeak = !onlyWeak;
      render();
    });
    document.getElementById('start-btn').addEventListener('click', () => {
      const pool = currentPool();
      if(pool.length === 0) return;
      session = { current: pickCard(pool), lastId: null, seen: 0, right: 0 };
      render();
    });
    return;
  }

  const pool = currentPool();
  if(pool.length === 0 || !session.current){
    app.innerHTML = `<div class="card-shell"><div class="empty">Keine Karten in dieser Auswahl.<br>Wähle andere Themen aus.</div>
      <button class="ghost" id="back-btn">Zurück zur Übersicht</button></div>`;
    document.getElementById('back-btn').addEventListener('click', () => { session = null; render(); });
    return;
  }

  const card = session.current;
  const deckName = DECKS[card.deck].name;
  const flipped = session.flipped;

  if(card.input){
    if(!session.checked){
      app.innerHTML = `
        <div class="card-shell">
          <div class="top-bar">
            <button class="back-link" id="exit-btn">‹ Übersicht</button>
            <span class="cat-name">${deckName}</span>
          </div>
          <div class="flashcard">
            <span class="tag">frage</span>
            ${drawIconSVG(card.icon)}
            ${drawNeighborMap(card.map)}
            <span>${card.front}</span>
          </div>
          <form id="answer-form">
            <input type="text" id="answer-input" class="answer-input" autocomplete="off"
              autocapitalize="words" autocorrect="off" spellcheck="false"
              placeholder="Antwort eintippen …">
            <button type="submit" class="primary" style="margin-top:0.7rem;">Prüfen</button>
          </form>
        </div>`;
      document.getElementById('exit-btn').addEventListener('click', () => { session = null; render(); });
      const input = document.getElementById('answer-input');
      input.focus();
      document.getElementById('answer-form').addEventListener('submit', e => {
        e.preventDefault();
        session.typedValue = input.value;
        session.wasCorrect = normalizeAnswer(input.value) === normalizeAnswer(card.back);
        session.checked = true;
        render();
      });
    } else {
      const ok = session.wasCorrect;
      app.innerHTML = `
        <div class="card-shell">
          <div class="top-bar">
            <button class="back-link" id="exit-btn">‹ Übersicht</button>
            <span class="cat-name">${deckName}</span>
          </div>
          <div class="flashcard" style="border-color:${ok ? 'var(--tanne)' : 'var(--terra)'};">
            <span class="tag">${ok ? 'richtig' : 'leider falsch'}</span>
            ${drawIconSVG(card.icon)}
            ${drawNeighborMap(card.map)}
            <span>${card.front}</span>
          </div>
          <div class="feedback-box ${ok ? 'feedback-ok' : 'feedback-bad'}">
            Deine Antwort: <span class="typed-echo">${session.typedValue || '(leer)'}</span>
            ${ok ? '' : `<br>Richtig: ${card.back}`}
          </div>
          <button class="primary" id="continue-btn" style="margin-top:0.9rem;">Weiter</button>
        </div>`;
      document.getElementById('exit-btn').addEventListener('click', () => { session = null; render(); });
      document.getElementById('continue-btn').addEventListener('click', () => handleAnswer(ok));
    }
    return;
  }

  app.innerHTML = `
    <div class="card-shell">
      <div class="top-bar">
        <button class="back-link" id="exit-btn">‹ Übersicht</button>
        <span class="cat-name">${deckName}</span>
      </div>
      <div class="flashcard ${flipped ? 'flipped' : ''}" id="flip-area">
        <span class="tag">${flipped ? 'antwort' : 'frage'}</span>
        ${drawIconSVG(card.icon)}
        <span>${flipped ? card.back : card.front}</span>
        <span class="hint">${flipped ? 'antippen zum Zurückdrehen' : 'antippen zum Aufdecken'}</span>
      </div>
      ${flipped ? `<div class="answer-buttons">
        <button class="btn-again" id="again-btn">Nochmal üben</button>
        <button class="btn-know" id="know-btn">Kann ich!</button>
      </div>` : ''}
    </div>
  `;

  if(!flipped){
    document.getElementById('flip-area').addEventListener('click', () => {
      session.flipped = true;
      render();
    });
  } else {
    document.getElementById('flip-area').addEventListener('click', () => {
      session.flipped = false;
      render();
    });
    document.getElementById('again-btn').addEventListener('click', (e) => { e.stopPropagation(); handleAnswer(false); });
    document.getElementById('know-btn').addEventListener('click', (e) => { e.stopPropagation(); handleAnswer(true); });
  }
  document.getElementById('exit-btn').addEventListener('click', () => { session = null; render(); });
}

function handleAnswer(correct){
  const card = session.current;
  const s = state[card.id];
  s.box = correct ? Math.min(4, s.box + 1) : 0;
  saveState();
  syncCard(card.id, s.box);
  const pool = currentPool();
  let next = pickCard(pool.filter(c => c.id !== card.id));
  if(!next) next = pickCard(pool);
  session.current = next;
  session.flipped = false;
  session.checked = false;
  session.typedValue = "";
  session.wasCorrect = null;
  render();
}

(async function init(){
  await loadState();
  render();
})();
</script>
</body>
</html>
